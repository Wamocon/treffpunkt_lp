<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="TreffPunkt Icon">
  <defs>
    <linearGradient id="bgGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edf7f2"/>
      <stop offset="100%" stop-color="#d4eddf"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#40916C"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGreen)"/>

  <!-- Person left -->
  <circle cx="156" cy="178" r="42" fill="url(#greenGrad)"/>
  <path d="M80 292 Q80 248 156 248 Q232 248 232 292" fill="url(#greenGrad)" opacity="0.85"/>

  <!-- Person center (slightly larger, organizer) -->
  <circle cx="256" cy="158" r="50" fill="url(#greenGrad)"/>
  <path d="M168 288 Q168 238 256 238 Q344 238 344 288" fill="url(#greenGrad)"/>

  <!-- Person right -->
  <circle cx="356" cy="178" r="42" fill="url(#greenGrad)"/>
  <path d="M280 292 Q280 248 356 248 Q432 248 432 292" fill="url(#greenGrad)" opacity="0.85"/>

  <!-- Connection lines between people -->
  <line x1="198" y1="178" x2="206" y2="174" stroke="#2D6A4F" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="306" y1="174" x2="314" y2="178" stroke="#2D6A4F" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- Location pin below center person -->
  <path d="M256 340 C256 340 216 395 216 418 C216 440 234 458 256 458 C278 458 296 440 296 418 C296 395 256 340 256 340Z" fill="#F4A261"/>
  <circle cx="256" cy="416" r="16" fill="#fff" opacity="0.9"/>
</svg>
